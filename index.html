<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A1008">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DungeonQuest">
  <title>DungeonQuest</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <link id="game-theme" rel="stylesheet" href="themes/dungeonquest.css">
  <script src="app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data>

  <div x-show="$store.game.error" class="error-banner">
    <strong>Error</strong>
    <span x-text="$store.game.error"></span>
  </div>

  <div x-show="!$store.game.loaded && !$store.game.error" class="loading">
    Loading decks…
  </div>

  <div x-show="$store.game.loaded" class="app-container">

    <header>
      <div class="header-inner">
        <h1 x-text="$store.game.config?.game ?? 'DungeonQuest'"></h1>
        <p class="header-instruction">Tap a deck to draw a card</p>
        <template x-if="$store.game.config?.info">
          <button @click="$store.game.openInfo()" class="btn-info-trigger" title="Adventurer's Guide">?</button>
        </template>
        <button @click="$store.game.resetAll()" class="btn btn-danger">↺ Reset All</button>
      </div>
    </header>

    <div class="app-layout">

      <!-- Left: Visual deck list (V19, V21, V24) -->
      <aside class="decks-panel" :class="{'panel-active': $store.game.activeTab === 'decks'}">
        <h2 class="panel-heading">Decks</h2>
        <div class="decks-list">
          <template x-for="deck in $store.game.decks" :key="deck.id">
            <div
              class="deck-entry"
              :class="{
                'deck-entry-active': $store.game.activeCard?.deckId === deck.id,
                'deck-entry-empty': deck.draw.length === 0
              }"
              @click="if (deck.draw.length > 0) { $store.game.draw(deck.id); $store.game.setTab('card') }"
            >
              <template x-if="$store.game.deckConfig(deck.id)?.backImage">
                <div class="deck-stack">
                  <div class="deck-stack-layer" :style="`background-image:url('${$store.game.deckConfig(deck.id).backImage}')`"></div>
                  <div class="deck-stack-layer" :style="`background-image:url('${$store.game.deckConfig(deck.id).backImage}')`"></div>
                  <div class="deck-stack-layer" :style="`background-image:url('${$store.game.deckConfig(deck.id).backImage}')`"></div>
                </div>
              </template>
              <div class="deck-entry-info">
                <div class="deck-entry-name" x-text="deck.name"></div>
                <template x-if="$store.game.deckConfig(deck.id)?.description">
                  <div class="deck-entry-desc" x-text="$store.game.deckConfig(deck.id).description"></div>
                </template>
                <div class="deck-entry-counts">
                  <span class="deck-count-remain" x-text="deck.draw.length + ' left'"></span>
                  <template x-if="deck.discard.length > 0">
                    <span class="deck-count-discard" x-text="'· ' + deck.discard.length + ' disc'"></span>
                  </template>
                </div>
              </div>
              <button
                @click.stop="$store.game.resetDeck(deck.id)"
                :disabled="deck.discard.length === 0"
                class="btn btn-secondary btn-sm deck-entry-reshuffle"
                title="Reshuffle discards into deck"
              >↺</button>
            </div>
          </template>
        </div>
        <button
          @click="$store.game.reshuffleAll()"
          :disabled="$store.game.decks.every(d => d.discard.length === 0)"
          class="btn btn-secondary reshuffle-all-btn"
        >↺ Reshuffle All Discards</button>
      </aside>

      <!-- Center: Global active card (V18, V22, V25) -->
      <section class="active-card-panel" :class="{'panel-active': $store.game.activeTab === 'card'}">
        <h2 class="panel-heading">Active Card</h2>
        <template x-if="$store.game.activeCard">
          <div
            class="active-card-wrap"
            :class="{'is-drawing': $store.game.drawAnimating}"
            @animationend="$store.game.drawAnimating = false"
          >
            <div
              class="card-frame"
              x-data="{ get cfg() { return $store.game.cardConfig($store.game.activeCard.deckId, $store.game.activeCard.card) } }"
            >
              <div class="card-frame-name" x-text="$store.game.activeCard.card"></div>
              <div class="card-frame-body">
                <template x-if="cfg?.image">
                  <img class="card-frame-image" :src="cfg.image" :alt="$store.game.activeCard.card">
                </template>
                <div
                  x-show="!cfg?.image"
                  class="card-frame-art-placeholder"
                  :style="$store.game.deckConfig($store.game.activeCard.deckId)?.backImage
                    ? `background-image:url('${$store.game.deckConfig($store.game.activeCard.deckId).backImage}')`
                    : ''"
                ></div>
                <template x-if="cfg?.description">
                  <div class="card-frame-description" x-text="cfg.description"></div>
                </template>
              </div>
              <div class="card-frame-footer">
                <template x-if="cfg?.type">
                  <span class="card-type" x-text="cfg.type"></span>
                </template>
              </div>
            </div>
            <div class="active-card-from">
              From: <strong x-text="$store.game.deckName($store.game.activeCard.deckId)"></strong>
            </div>
            <div class="active-card-actions">
              <button @click="$store.game.keepActive()" class="btn btn-action-keep">📦 Keep in Inventory</button>
              <button @click="$store.game.clearActive()" class="btn btn-action-discard">🗑 Discard</button>
              <button
                @click="$store.game.drawAnother()"
                :disabled="$store.game.decks.find(d => d.id === $store.game.activeCard.deckId)?.draw.length === 0"
                class="btn btn-action-draw"
              >🎴 Draw Another</button>
            </div>
          </div>
        </template>
        <div x-show="!$store.game.activeCard" class="active-card-empty">
          <p>No card drawn</p>
          <p class="text-dim">Tap any deck to draw</p>
        </div>
      </section>

      <!-- Right: Inventory panel (V12, V15, V26) -->
      <aside class="inventory-panel" :class="{'panel-active': $store.game.activeTab === 'inventory'}">
        <h2 class="panel-heading">
          Inventory
          <span
            x-show="$store.game.inventory.length > 0"
            class="panel-count"
            x-text="$store.game.inventory.length"
          ></span>
        </h2>
        <div x-show="$store.game.inventory.length === 0" class="inventory-empty-msg">No items held</div>
        <div class="inventory-list">
          <template x-for="(item, idx) in $store.game.inventory" :key="idx">
            <div
              class="inventory-row"
              x-data="{ get cfg() { return $store.game.cardConfig(item.deckId, item.card) } }"
            >
              <div class="inv-thumb" :class="'inv-type-' + (cfg?.type ?? 'default')">
                <span x-text="(cfg?.type ?? '?').charAt(0).toUpperCase()"></span>
              </div>
              <div class="inventory-row-body">
                <span class="inventory-row-name" x-text="item.card"></span>
                <span class="inventory-row-deck" x-text="$store.game.deckName(item.deckId)"></span>
                <template x-if="cfg?.description">
                  <span class="inventory-row-desc" x-text="cfg.description"></span>
                </template>
              </div>
              <button @click="$store.game.use(idx)" class="btn btn-danger btn-sm">Use</button>
            </div>
          </template>
        </div>
        <button
          class="btn btn-secondary view-all-btn"
          @click="$store.game.setTab('inventory')"
        >View Full Inventory</button>
      </aside>

    </div><!-- .app-layout -->

    <!-- Mobile tab bar (V20, V28) -->
    <nav class="tab-bar">
      <button
        @click="$store.game.setTab('decks')"
        :class="{'tab-active': $store.game.activeTab === 'decks'}"
        class="tab-btn"
      >Decks</button>
      <button
        @click="$store.game.setTab('card')"
        :class="{'tab-active': $store.game.activeTab === 'card'}"
        class="tab-btn"
      >Active<span x-show="$store.game.activeCard" class="tab-indicator"></span></button>
      <button
        @click="$store.game.setTab('inventory')"
        :class="{'tab-active': $store.game.activeTab === 'inventory'}"
        class="tab-btn"
      >Inventory<span x-show="$store.game.inventory.length > 0" class="tab-badge" x-text="$store.game.inventory.length"></span></button>
    </nav>

  </div><!-- .app-container -->

  <!-- Combat overlay (V42-V46) -->
  <template x-if="$store.game.combatState">
    <div class="combat-overlay">

      <!-- Active combat screen -->
      <template x-if="$store.game.combatState.status === 'active'">
        <div
          class="combat-card"
          x-data="{ get cfg() { return $store.game.cardConfig($store.game.combatState.deckId, $store.game.combatState.card) } }"
        >
          <div class="combat-header">
            <div class="combat-label">⚔ Combat</div>
            <div class="combat-attribute" x-text="$store.game.combatState.attribute_type + ' Check'"></div>
          </div>
          <div class="combat-monster-name" x-text="$store.game.combatState.card"></div>
          <template x-if="cfg?.image">
            <img class="combat-monster-image" :src="cfg.image" :alt="$store.game.combatState.card">
          </template>
          <div
            x-show="!cfg?.image"
            class="combat-monster-placeholder"
            :style="$store.game.deckConfig($store.game.combatState.deckId)?.backImage
              ? `background-image:url('${$store.game.deckConfig($store.game.combatState.deckId).backImage}')`
              : ''"
          ></div>
          <ol class="combat-rules">
            <li>Roll 2d6</li>
            <li>Result ≤ <strong x-text="$store.game.combatState.attribute_type"></strong> → monster takes 1 wound</li>
            <li>Result &gt; <strong x-text="$store.game.combatState.attribute_type"></strong> → you take 1 wound</li>
            <li>Doubles → 2 wounds instead</li>
          </ol>
          <div class="combat-actions">
            <button @click="$store.game.dealDamage(2)" class="btn combat-btn-damage">-2</button>
            <button @click="$store.game.dealDamage(1)" class="btn combat-btn-damage">-1</button>
            <button @click="$store.game.fleeCombat()" class="btn btn-secondary combat-btn-flee">Flee</button>
            <button @click="$store.game.playerDied()" class="btn btn-danger combat-btn-died">Player Died</button>
          </div>
        </div>
      </template>

      <!-- Victory screen -->
      <template x-if="$store.game.combatState.status === 'victory'">
        <div class="combat-card combat-end-screen">
          <template x-if="$store.game.config?.combat?.victory_image">
            <img class="combat-end-image" :src="$store.game.config.combat.victory_image" alt="Victory">
          </template>
          <template x-if="!$store.game.config?.combat?.victory_image">
            <div class="combat-end-icon">🏆</div>
          </template>
          <div class="combat-end-title">Victory!</div>
          <div class="combat-end-subtitle" x-text="$store.game.combatState.card + ' defeated.'"></div>
          <button @click="$store.game.dismissCombat()" class="btn combat-btn-damage">Continue</button>
        </div>
      </template>

      <!-- Fled screen -->
      <template x-if="$store.game.combatState.status === 'fled'">
        <div class="combat-card combat-end-screen">
          <div class="combat-end-icon">🏃</div>
          <div class="combat-end-title">Escaped!</div>
          <div class="combat-end-penalty-label">Escape Penalty</div>
          <div class="combat-end-penalty" x-text="$store.game.combatState.escape_penalty"></div>
          <button @click="$store.game.dismissCombat()" class="btn btn-secondary">Dismiss</button>
        </div>
      </template>

      <!-- Death screen -->
      <template x-if="$store.game.combatState.status === 'died'">
        <div class="combat-card combat-end-screen">
          <template x-if="$store.game.config?.combat?.death_image">
            <img class="combat-end-image" :src="$store.game.config.combat.death_image" alt="Defeated">
          </template>
          <template x-if="!$store.game.config?.combat?.death_image">
            <div class="combat-end-icon">💀</div>
          </template>
          <div class="combat-end-title">Defeated</div>
          <div class="combat-end-subtitle">Your quest ends here.</div>
          <button @click="$store.game.dismissCombat()" class="btn btn-danger">End Game</button>
        </div>
      </template>

    </div>
  </template>

  <!-- Info panel (V31-V36) — rendered only when config.info exists -->
  <template x-if="$store.game.config?.info">
    <div>
      <div
        class="info-overlay"
        :class="{'info-overlay-visible': $store.game.infoOpen}"
        @click="$store.game.closeInfo()"
      ></div>
      <aside
        class="info-panel"
        :class="{'info-panel-open': $store.game.infoOpen}"
        @keydown.escape.window="$store.game.closeInfo()"
      >
        <div class="info-panel-header">
          <div class="info-panel-titles">
            <h2 class="info-panel-title" x-text="$store.game.config.info.title"></h2>
            <template x-if="$store.game.config.info.subtitle">
              <p class="info-panel-subtitle" x-text="$store.game.config.info.subtitle"></p>
            </template>
          </div>
          <button @click="$store.game.closeInfo()" class="info-close-btn" aria-label="Close">✕</button>
        </div>
        <div class="info-panel-body">
          <template x-for="section in $store.game.config.info.sections" :key="section.heading">
            <div class="info-section">
              <h3 class="info-section-heading" x-text="section.heading"></h3>
              <template x-for="(item, idx) in section.items" :key="idx">
                <div class="info-item">
                  <template x-if="item.icon">
                    <span class="info-item-icon" x-text="item.icon"></span>
                  </template>
                  <span class="info-item-text" x-text="item.text"></span>
                </div>
              </template>
            </div>
          </template>
        </div>
      </aside>
    </div>
  </template>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
